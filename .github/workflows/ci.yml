name: CI

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-test:
    name: Swift format, lint, and test
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Show Swift version
        run: swift --version

      - name: Remove untrusted Homebrew taps
        run: brew untap aws/tap || true

      - name: Install Swift linters
        run: brew install swift-format swiftlint

      - name: Resolve package dependencies
        run: swift package resolve

      - name: Check formatting
        run: swift-format lint --recursive Sources Tests Package.swift

      - name: Run SwiftLint
        run: swiftlint lint --quiet

      - name: Run tests
        run: swift test

  build-docs:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install documentation dependencies
        working-directory: docs
        run: npm ci

      - name: Build documentation
        working-directory: docs
        run: npm run docs:build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

  deploy-docs:
    name: Deploy documentation
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
