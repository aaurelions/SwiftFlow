name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-test:
    name: SwiftPM Build & Test
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Show Swift version
        run: swift --version

      - name: Resolve package dependencies
        run: swift package resolve
        working-directory: .

      - name: Build
        run: swift build --configuration release
        working-directory: .

      - name: Test
        run: swift test --configuration release
        working-directory: .

  docs-build:
    name: VitePress Docs Build
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs:build
