included:
  - Sources
  - Tests
  - Package.swift

excluded:
  - .build
  - docs/node_modules
  - docs/.vitepress/cache
  - docs/.vitepress/dist

disabled_rules:
  # SwiftFlow intentionally mirrors React Flow and SwiftUI geometry naming.
  # Short coordinate names (`x`, `y`, `dx`, `dy`) and geometry tuples keep the
  # public API aligned with the documented React Flow concepts.
  - identifier_name
  - large_tuple

  # This library exposes a broad SwiftUI canvas API in a single generic view.
  # Decomposition is balanced against public API readability and type inference.
  - type_body_length
  - file_length
  - function_body_length
  - function_parameter_count
  - cyclomatic_complexity

  # Use swift-format as the source of truth for layout/style rules.
  - closure_parameter_position
  - multiple_closures_with_trailing_closure
  - opening_brace
  - implicit_optional_initialization
  - redundant_discardable_let
  - shorthand_operator
  - trailing_comma
  - for_where
  - unused_enumerated
